spring:
  config:
    import: ""

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  h2:
    console:
      enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}

  cache:
    type: simple

aws:
  sqs:
    queue-url: ""

# Cognito issuer for tests (public pool identifier — no Secrets Manager in unit tests)
COGNITO_ISSUER_URI: https://cognito-idp.ap-south-2.amazonaws.com/ap-south-2_WC7CVQHFC
COGNITO_USER_POOL_ID: ap-south-2_WC7CVQHFC

orderms:
  security:
    cognito:
      resolve-groups-via-api: false

management:
  health:
    redis:
      enabled: false

logging:
  level:
    root: WARN
    com.winsoon: INFO

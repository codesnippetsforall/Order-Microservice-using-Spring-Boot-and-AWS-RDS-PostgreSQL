spring:
  application:
    name: orderms

  # Load AWS Secrets Manager (if available)
  # This uses Spring Cloud AWS 3.x approach
  # - optional: prefix makes it not fail if Secrets Manager unavailable
  # - Uses environment variables: AWS_REGION, DATABASE_* for local overrides
  config:
    import: optional:aws-secretsmanager:winsoon/orderms/postgresql

  # AWS Configuration (Spring Cloud AWS 3.x)
  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-south-2}

  # Datasource Configuration
  # Uses secrets from AWS Secrets Manager or environment variables
  # Fallback values for local development
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:ap-south-2.rds.amazonaws.com}:${DATABASE_PORT:5432}/${DATABASE_NAME:orderms_db}
    username: ${DATABASE_USERNAME:orderms_user}
    password: ${DATABASE_PASSWORD:orderms_user}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  # Flyway (optional)
  flyway:
    enabled: false

# AWS Configuration (SQS for event messaging)
aws:
  region: ${AWS_REGION:ap-south-2}
  sqs:
    # Queue URL for order events (FIFO queue recommended for ordering)
    # Format: https://sqs.{region}.amazonaws.com/{account-id}/{queue-name}.fifo
    # Leave empty to disable event publishing
    queue-url: ${AWS_SQS_QUEUE_URL:}
    # Queue name for reference
    queue-name: ${AWS_SQS_QUEUE_NAME:orderms-events.fifo}

# Server Configuration
server:
  port: ${APPLICATION_PORT:8020}
  servlet:
    context-path: /api
  compression:
    enabled: true

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Actuator/Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

# Logging Configuration
logging:
  level:
    root: INFO
    com.winsoon: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

spring:
  application:
    name: orderms

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # Load AWS Secrets Manager (if available)
  # This uses Spring Cloud AWS 3.x approach
  # - optional: prefix makes it not fail if Secrets Manager unavailable
  # - Uses environment variables: AWS_REGION, DATABASE_* for local overrides
  config:
    import: optional:aws-secretsmanager:winsoon/orderms/postgresql,optional:aws-secretsmanager:winsoon/orderms/sqs,optional:aws-secretsmanager:winsoon/orderms/cognito,optional:aws-secretsmanager:winsoon/orderms/redis

  # AWS Configuration (Spring Cloud AWS 3.x)
  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-south-2}

  # Datasource — values from AWS Secrets Manager (winsoon/orderms/postgresql) on EC2.
  # Local dev: export DATABASE_HOST, DATABASE_USERNAME, DATABASE_PASSWORD.
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT:5432}/${DATABASE_NAME:orderms_db}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  # Phase 2 — Cognito JWT validation (OAuth2 Resource Server)
  # COGNITO_ISSUER_URI loaded from Secrets Manager: winsoon/orderms/cognito
  # Local override: export COGNITO_ISSUER_URI=... when not using AWS
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}

# Phase 3 — Cognito groups/scopes in access token via Pre Token Lambda (deploy/setup-pretoken-lambda.sh)
orderms:
  security:
    cognito:
      user-pool-id: ${COGNITO_USER_POOL_ID}
      # Groups come from cognito:groups claim in JWT; no runtime Cognito API calls in production
      resolve-groups-via-api: false
      group-cache-ttl-minutes: 5
  cache:
    redis:
      ttl-seconds: ${REDIS_CACHE_TTL_SECONDS:300}
aws:
  region: ${AWS_REGION:ap-south-2}
  sqs:
    # Queue URL for order events (FIFO queue recommended for ordering)
    # Format: https://sqs.{region}.amazonaws.com/{account-id}/{queue-name}.fifo
    # Leave empty to disable event publishing
    queue-url: ${ORDERMS_AWS_SQS_QUEUE_URL:}
    # Queue name for reference
    queue-name: ${ORDERMS_AWS_SQS_QUEUE_NAME:orderms-events.fifo}

# Server Configuration
server:
  port: ${APPLICATION_PORT:8020}
  servlet:
    context-path: /api
  compression:
    enabled: true

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Actuator/Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

# Logging Configuration
logging:
  level:
    root: INFO
    com.winsoon: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
